<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табы</title>
</head>
<body>
    
<div class="buttons">
<button class="buttonone">первая</button>
<button class="buttontwo">вторая</button>
</div>
<div class="text"></div>
<script>
    let btn1 = document.querySelector(".buttonone");
    let btn2 = document.querySelector(".buttontwo");
    let text = document.querySelector(".text");
    btn1.addEventListener("click", function onClickone (){
        text.innerHTML = "текст 1 вкладки";
    });
     btn2.addEventListener("click", function onClicktwo(){
        text.innerHTML = "текст 2 вкладки";
    });
</script>

</body>
</html>
